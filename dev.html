<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pickleball Court Tracker [DEV]</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; padding: 20px; }
  h1 { text-align: center; margin-bottom: 20px; color: #e94560; }
  #setup, #game { max-width: 800px; margin: 0 auto; }
  #game { display: none; }
  .setup-form { background: #16213e; padding: 20px; border-radius: 12px; }
  .setup-form label { display: block; margin-bottom: 6px; font-weight: 600; }
  .setup-form textarea { width: 100%; height: 120px; padding: 10px; border-radius: 8px; border: none; font-size: 14px; background: #0f3460; color: #eee; resize: vertical; }
  .setup-form small { color: #aaa; }
  button { background: #e94560; color: #fff; border: none; padding: 10px 24px; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; margin-top: 12px; }
  button:hover { background: #c73650; }
  .court { background: #16213e; border-radius: 12px; padding: 16px; margin-bottom: 20px; }
  .court h2 { color: #e94560; margin-bottom: 12px; font-size: 18px; }
  .matchups { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 12px; }
  .match { background: #0f3460; border-radius: 8px; padding: 12px; flex: 1; min-width: 200px; }
  .match .vs { text-align: center; color: #e94560; font-weight: 700; margin: 4px 0; }
  .match .team { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; }
  .match .team .seed { color: #aaa; font-size: 12px; margin-right: 8px; }
  .match .team .name { font-weight: 600; font-size: 16px; }
  .match button { width: 100%; margin-top: 8px; padding: 8px; font-size: 13px; }
  .players-list { display: flex; gap: 8px; flex-wrap: wrap; }
  .players-list .player { background: #0f3460; padding: 6px 12px; border-radius: 6px; font-size: 13px; }
  .player .seed-num { color: #e94560; font-weight: 700; margin-right: 4px; }
  .player .consec { color: #ff6b6b; font-size: 11px; margin-left: 4px; }
  .round-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .round-header h2 { color: #e94560; }
  #history { max-width: 800px; margin: 20px auto 0; }
  #history h2 { color: #e94560; margin-bottom: 10px; }
  .history-entry { background: #16213e; padding: 10px 14px; border-radius: 8px; margin-bottom: 6px; font-size: 13px; color: #ccc; }
  .sync-status { text-align: center; font-size: 12px; color: #4ecca3; margin-bottom: 10px; }
  #lock { display: flex; justify-content: center; align-items: center; min-height: 60vh; }
  #lock .lock-box { background: #16213e; padding: 30px; border-radius: 12px; text-align: center; max-width: 400px; width: 90%; }
  #lock input { padding: 10px; border-radius: 8px; border: none; background: #0f3460; color: #eee; font-size: 16px; text-align: center; width: 200px; margin-top: 10px; }
  #lock .error { color: #ff6b6b; font-size: 13px; margin-top: 8px; }
  #app { display: none; }
  .player-row { display: flex; align-items: center; gap: 6px; padding: 6px 8px; margin: 4px 0; background: #0f3460; border-radius: 8px; }
  .player-row .seed-label { color: #e94560; font-weight: 700; min-width: 28px; }
  .player-row input.name-input { flex: 1; padding: 6px; border-radius: 6px; border: none; background: #16213e; color: #eee; font-size: 14px; }
  .player-row input.dupr-input { width: 50px; padding: 6px; border-radius: 6px; border: none; background: #16213e; color: #4ecca3; font-size: 13px; text-align: center; }
  .player-row .move-btn { background: none; border: none; color: #4ecca3; cursor: pointer; font-size: 18px; padding: 0 2px; margin: 0; line-height: 1; }
  .player-row .move-btn:hover { color: #e94560; }

  .dupr-badge { color: #4ecca3; font-size: 11px; margin-left: 4px; }

<body>

<div id="game">

<script>
// --- DUPR CORS Proxy ---
const DUPR_PROXY = 'https://dupr-proxy.mr-shamshersingh.workers.dev';
function duprUrl(path) { return DUPR_PROXY + path; }

// --- Session & Admin ---
const DEFAULT_ADMIN_CODE = 'adminpickle2026';
let ADMIN_CODE = null;

function loadAdminCode() {
  return getDb().ref('dev-config/adminCode').once('value').then(snap => {
    ADMIN_CODE = snap.val() || DEFAULT_ADMIN_CODE;
  });
}

function changeAdminCode() {
  const val = document.getElementById('newAdminCode').value.trim();
  if (!val || val.length < 4) { document.getElementById('adminCodeMsg').textContent = 'Must be at least 4 characters.'; return; }
  getDb().ref('dev-config/adminCode').set(val).then(() => {
    ADMIN_CODE = val;
    document.getElementById('newAdminCode').value = '';
    document.getElementById('adminCodeMsg').textContent = '✅ Admin passcode updated.';
  });
}
let sessionKey = '';
let fbApp = null;

function getDb() {
  if (!fbApp) {
    fbApp = firebase.initializeApp({
      apiKey: "AIzaSyD4C8latdB9eZxVRvk41t_YsZFVrUDFNHA",
      authDomain: "pickleball-tracker-2ce69.firebaseapp.com",
      databaseURL: "https://pickleball-tracker-2ce69-default-rtdb.firebaseio.com",
      projectId: "pickleball-tracker-2ce69",
      storageBucket: "pickleball-tracker-2ce69.firebasestorage.app",
      messagingSenderId: "899482641607",
      appId: "1:899482641607:web:b02e440285628554aa4ae2"
    });
  }
  return firebase.database();
}

function checkPasscode() {
  const input = document.getElementById('passcodeInput').value.trim();
  if (!input) { document.getElementById('lockError').textContent = 'Enter a passcode.'; return; }
  document.getElementById('lockError').textContent = 'Checking...';
  const proceed = () => {
    if (input === ADMIN_CODE) {
      document.getElementById('lockError').textContent = '';
      document.getElementById('adminPanel').style.display = 'block';
      loadExistingSessions();
      return;
    }
    const key = input.toLowerCase().replace(/[^a-z0-9]/g, '');
    getDb().ref('dev-sessions/' + key).once('value').then(snap => {
      if (snap.exists()) {
        sessionKey = key;
        sessionStorage.setItem('pb_session', input);
        doUnlock();
      } else {
        document.getElementById('lockError').textContent = 'Session not found. Check the passcode or ask your organizer.';
      }
    }).catch(() => {
      document.getElementById('lockError').textContent = 'Connection error. Try again.';
    });
  };
  if (ADMIN_CODE === null) loadAdminCode().then(proceed);
  else proceed();
}

function loadExistingSessions() {
  getDb().ref('dev-sessions').once('value').then(snap => {
    const data = snap.val();
    const el = document.getElementById('existingSessions');
    if (!data) { el.innerHTML = '<div style="color:#aaa;margin-top:8px">No sessions yet.</div>'; return; }
    el.innerHTML = '<div style="margin-top:8px"><b style="color:#eee">Active sessions:</b>' +
      Object.entries(data).map(([k, v]) =>
        '<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #333">' +
        '<span style="color:#eee;cursor:pointer" onclick="joinFromAdmin(\'' + k + '\',\'' + (v.name||k).replace(/'/g,"\\'") + '\')">' + (v.name || k) +
        ' <small style="color:#666">' + (v.created ? '· ' + new Date(v.created).toLocaleDateString() : '') + '</small></span>' +
        '<button onclick="deleteSession(\'' + k + '\',\'' + (v.name||k).replace(/'/g,"\\'") + '\')" style="background:#e94560;padding:2px 8px;font-size:11px;margin:0">✕</button>' +
        '</div>'
      ).join('') + '</div>';
  }).catch(() => {
    document.getElementById('existingSessions').innerHTML = '<div style="color:#ff6b6b">Failed to load sessions.</div>';
  });
}

function joinFromAdmin(key, name) {
  sessionKey = key;
  sessionStorage.setItem('pb_session', name);
  doUnlock();
}

function deleteSession(key, name) {
  if (!confirm('Delete session "' + name + '"?')) return;
  getDb().ref('dev-sessions/' + key).remove().then(() => loadExistingSessions());
}

function createSession() {
  const input = document.getElementById('newSessionCode').value.trim();
  if (!input) return;
  const key = input.toLowerCase().replace(/[^a-z0-9]/g, '');
  if (key === ADMIN_CODE.toLowerCase().replace(/[^a-z0-9]/g, '')) { alert('Cannot use admin code as session name.'); return; }
  getDb().ref('dev-sessions/' + key).set({ name: input, created: new Date().toISOString() }).then(() => {
    sessionKey = key;
    sessionStorage.setItem('pb_session', input);
    doUnlock();
  });
}

function doUnlock() {
  document.getElementById('lock').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('syncStatus').textContent = '🔄 Connecting...';
  initApp();
}

// Auto-unlock if session exists
if (sessionStorage.getItem('pb_session')) {
  document.addEventListener('DOMContentLoaded', function() {
    const saved = sessionStorage.getItem('pb_session');
    if (!saved) return;
    const key = saved.toLowerCase().replace(/[^a-z0-9]/g, '');
    getDb().ref('dev-sessions/' + key).once('value').then(snap => {
      if (snap.exists()) { sessionKey = key; doUnlock(); }
      else { sessionStorage.removeItem('pb_session'); }
    });
  });
}

// --- App ---
let state = { players: [], round: 1, history: [], pendingResults: {}, prevState: null };
let db;

function switchSession() {
  if (!confirm('Switch to a different session?')) return;
  if (db) db.off();
  sessionStorage.removeItem('pb_session');
  location.reload();
}

function initApp() {
  getDb();
  db = firebase.database().ref('dev-' + sessionKey + '/game');

  // Listen for real-time updates from Firebase
  db.on('value', (snapshot) => {
  const data = snapshot.val();
  if (data && data.players && data.players.length) {
    state = data;
    state.pendingResults = state.pendingResults || {};
    state.history = state.history || [];
    document.getElementById('setup').style.display = 'none';
    document.getElementById('game').style.display = 'block';
    render();
  } else {
    document.getElementById('setup').style.display = 'block';
    document.getElementById('game').style.display = 'none';
  }
  updateSyncStatus('✅ Connected');
  });
  initDocInput();
  fetchSchedule();
  renderPlayerList(dummyNames.slice(0, 8));
} // end initApp

function updateSyncStatus(msg) {
  const el = document.getElementById('syncStatus');
  if (state.sessionDate && state.sessionDate !== 'Custom Game') {
    el.innerHTML = '<span style="font-size:18px;font-weight:700;color:#4ecca3">📅 ' + state.sessionDate + '</span>';
  } else {
    el.textContent = '';
  }
}

function saveState() {
  db.set(state).then(() => {
    updateSyncStatus('✅ Synced');
  }).catch(() => {
    updateSyncStatus('❌ Sync failed');
  });
}

function startGame(dupr) {
  document.getElementById('pastSessions').style.display = 'none';
  const names = getPlayerNames();
  const duprs = getPlayerDuprs();
  const courtLabels = getCourtNumbers();
  const numCourts = courtLabels.length;
  const needed = numCourts * 4;
  if (!numCourts) return alert('Enter court numbers (e.g. 3, 5, 7).');
  if (names.length !== needed) return alert(`You need exactly ${needed} players for ${numCourts} courts. You entered ${names.length}.`);
  state.players = names.map((name, i) => ({ name, seed: i + 1, consecLosses: 0, dupr: duprs[i] || 0 }));
  state.courtLabels = courtLabels;
  state.duprMode = !!dupr;
  state.startingDuprs = state.duprMode ? Object.fromEntries(names.map((name, i) => [name, duprs[i] || 0])) : null;
  state.round = 1;
  state.history = [];
  state.pendingResults = {};
  state.sessionStart = new Date().toISOString();
  state.sessionDate = document.getElementById('dateSelect').value || 'Custom Game';
  state.isQuickGame = false;
  document.getElementById('setup').style.display = 'none';
  document.getElementById('game').style.display = 'block';
  saveState();
  render();
}

function resetGame() {
  if (!confirm('Reset the game for everyone?')) return;
  clearInterval(timerInterval); timerInterval = null;
  if (state.history && state.history.length && !state.isQuickGame) {
    const key = (state.sessionDate || 'Custom') + '_' + (state.sessionStart || new Date().toISOString()).replace(/[.#$/\[\]]/g, '_');
    firebase.database().ref('dev-' + sessionKey + '/archive/' + key.replace(/[.#$/\[\]]/g, '_')).set({
      sessionDate: state.sessionDate || 'Custom Game',
      sessionStart: state.sessionStart,
      sessionEnd: new Date().toISOString(),
      players: state.players,
      history: state.history,
      rounds: state.round - 1
    });
  }
  state = { players: [], round: 1, history: [], pendingResults: {}, prevState: null };
  db.remove();
  document.getElementById('setup').style.display = 'block';
  document.getElementById('game').style.display = 'none';
  document.getElementById('history').innerHTML = '';
}

function endSession() {
  if (!confirm('End this session and save to history?')) return;
  clearInterval(timerInterval); timerInterval = null;
  const snap = JSON.parse(JSON.stringify(state));
  if (db) db.off();
  let promise = Promise.resolve();
  if (snap.players && snap.players.length && !snap.isQuickGame) {
    const key = (snap.sessionDate || 'Custom') + '_' + (snap.sessionStart || new Date().toISOString()).replace(/[.#$/\[\]]/g, '_');
    promise = firebase.database().ref('dev-' + sessionKey + '/archive/' + key.replace(/[.#$/\[\]]/g, '_')).set({
      sessionDate: snap.sessionDate || 'Custom Game',
      sessionStart: snap.sessionStart,
      sessionEnd: new Date().toISOString(),
      players: snap.players,
      history: snap.history || [],
      rounds: snap.round - 1
    });
  }
  promise.then(() => {
    if (db) db.remove();
    state = { players: [], round: 1, history: [], pendingResults: {}, prevState: null };
    document.getElementById('setup').style.display = 'block';
    document.getElementById('game').style.display = 'none';
    document.getElementById('history').innerHTML = '';
    location.reload();
  });
}

function getCourts() {
  const courts = [];
  for (let i = 0; i < state.players.length; i += 4) {
    courts.push(state.players.slice(i, i + 4));
  }
  return courts;
}

function fmtDupr(p) { return p.dupr ? ' <span class="dupr-badge">' + p.dupr.toFixed(3) + '</span>' : ''; }

function updateSimDupr(players, base, winIdxs, loseIdxs, wScore, lScore) {
  const K = 0.08;
  const wAvg = winIdxs.reduce((s, i) => s + (players[base + i].dupr || 3.5), 0) / 2;
  const lAvg = loseIdxs.reduce((s, i) => s + (players[base + i].dupr || 3.5), 0) / 2;
  const expectedWin = 1 / (1 + Math.pow(10, (lAvg - wAvg) / 1.5));
  let delta;
  if (wScore !== null && lScore !== null) {
    const total = wScore + lScore || 1;
    const actualShare = wScore / total;
    const expectedShare = 0.5 + (expectedWin - 0.5) * 0.6;
    delta = K * (actualShare - expectedShare);
  } else {
    delta = K * (1 - expectedWin);
  }
  const changes = [];
  winIdxs.forEach(i => {
    const p = players[base + i];
    if (!p.dupr) return;
    const d = +Math.abs(delta).toFixed(3);
    p.dupr = Math.min(8, +(p.dupr + d).toFixed(3));
    changes.push({ name: p.name, change: '+' + d.toFixed(3) });
  });
  loseIdxs.forEach(i => {
    const p = players[base + i];
    if (!p.dupr) return;
    const d = +Math.abs(delta).toFixed(3);
    p.dupr = Math.max(2, +(p.dupr - d).toFixed(3));
    changes.push({ name: p.name, change: '-' + d.toFixed(3) });
  });
  return changes;
}

var buzzerAudio = null;

  for (var i = 0; i < samples; i++) {
    var t = i / sr, val = 0;
    for (var b = 0; b < bursts.length; b++) {
      if (t >= bursts[b][0] && t < bursts[b][1]) {
        var env = 1 - (t - bursts[b][0]) / (bursts[b][1] - bursts[b][0]);
        val = (Math.sin(2 * Math.PI * 2800 * t) > 0 ? 1 : -1) * env * 0.8;
      }
    }
    buf[i] = val;
  }
  var numCh = 1, bps = 16, byteRate = sr * numCh * bps / 8;
  var dataLen = samples * numCh * bps / 8;
  var header = new ArrayBuffer(44);
  var v = new DataView(header);
  function ws(o, s) { for (var i = 0; i < s.length; i++) v.setUint8(o + i, s.charCodeAt(i)); }
  ws(0, 'RIFF'); v.setUint32(4, 36 + dataLen, true); ws(8, 'WAVE');
  ws(12, 'fmt '); v.setUint32(16, 16, true); v.setUint16(20, 1, true);
  v.setUint16(22, numCh, true); v.setUint32(24, sr, true);
  v.setUint32(28, byteRate, true); v.setUint16(32, numCh * bps / 8, true);
  v.setUint16(34, bps, true); ws(36, 'data'); v.setUint32(40, dataLen, true);
  var pcm = new Int16Array(samples);
  for (var i = 0; i < samples; i++) pcm[i] = Math.max(-32768, Math.min(32767, buf[i] * 32767));
  var blob = new Blob([header, pcm.buffer], { type: 'audio/wav' });
  buzzerAudio = new Audio(URL.createObjectURL(blob));
  buzzerAudio.preload = 'auto';
})();
document.addEventListener('touchstart', function() { buzzerAudio.load(); }, { once: true });
document.addEventListener('click', function() { buzzerAudio.load(); }, { once: true });

let buzzerRepeatTimer = null;
let buzzerStartTime = 0;
function playBuzzer(duration) {
  clearTimeout(buzzerRepeatTimer);
  var vol = (document.getElementById('buzzerVol') ? document.getElementById('buzzerVol').value : 50) / 100;
  var dur = (duration || 60) * 1000;
  buzzerStartTime = Date.now();
  function chimeLoop() {
    if (Date.now() - buzzerStartTime >= dur) { buzzerRepeatTimer = null; return; }
    buzzerAudio.volume = vol;
    buzzerAudio.currentTime = 0;
    buzzerAudio.play().catch(function(){});
    buzzerRepeatTimer = setTimeout(chimeLoop, 2000);
  }
  chimeLoop();
}

let timerInterval = null;
let localTimerEnd = null;
function startSessionTimer() {
  clearInterval(timerInterval);
  const mins = prompt('Set game timer (minutes):', '15');
  if (!mins || isNaN(mins) || mins <= 0) { document.getElementById('sessionTimer').textContent = '⏱ Set Timer'; return; }
  localTimerEnd = Date.now() + mins * 60000;
  document.getElementById('stopTimerBtn').style.display = 'inline';
  runTimer();
}
function stopTimer() {
  clearInterval(timerInterval); timerInterval = null;
  clearTimeout(buzzerRepeatTimer); buzzerRepeatTimer = null;
  localTimerEnd = null;
  document.getElementById('sessionTimer').textContent = '⏱ Set Timer';
  document.getElementById('sessionTimer').style.color = '#4ecca3';
  document.getElementById('stopTimerBtn').style.display = 'none';
  if (buzzerAudio) { buzzerAudio.pause(); buzzerAudio.currentTime = 0; }
}
function runTimer() {
  clearInterval(timerInterval);
  function tick() {
    const el = document.getElementById('sessionTimer');
    if (!el || !localTimerEnd) return;
    const left = Math.max(0, Math.floor((localTimerEnd - Date.now()) / 1000));
    const m = Math.floor(left / 60), sec = left % 60;
    el.textContent = '⏱ ' + m + ':' + String(sec).padStart(2, '0');
    el.style.color = left <= 60 ? '#e94560' : left <= 180 ? '#f0a500' : '#4ecca3';
    if (left === 0) { clearInterval(timerInterval); timerInterval = null; el.textContent = '⏱ TIME!'; playBuzzer(); localTimerEnd = null; document.getElementById('stopTimerBtn').style.display = 'inline'; }
  }
  tick();
  timerInterval = setInterval(tick, 1000);
}

function renderDuprSummary() {
  const el = document.getElementById('duprSummary');
  if (!el || !state.startingDuprs || !state.players.some(p => p.dupr > 0)) { if (el) el.innerHTML = ''; return; }
  const seen = new Set();
  const rows = state.players.filter(p => p.dupr > 0).map(p => ({ name: p.name, start: state.startingDuprs[p.name] || p.dupr, now: p.dupr })).filter(r => r.start > 0 && !seen.has(r.name) && seen.add(r.name));
  if (!rows.length) { el.innerHTML = ''; return; }
  rows.sort((a, b) => b.now - a.now);
  let html = '<div style="background:#0f3460;border-radius:8px;padding:12px;margin-top:16px">';
  html += '<h2 style="color:#e94560;margin:0 0 8px;font-size:16px">📊 DUPR Tracker</h2>';
  rows.forEach(r => {
    const diff = r.now - r.start;
    const sign = diff >= 0 ? '+' : '';
    const color = diff > 0 ? '#4ecca3' : diff < 0 ? '#e94560' : '#aaa';
    html += `<div style="display:flex;justify-content:space-between;padding:4px 8px;font-size:13px">`;
    html += `<span>${r.name}</span>`;
    html += `<span><span style="color:#aaa">${r.start.toFixed(3)}</span> → <span style="color:#4ecca3;font-weight:600">${r.now.toFixed(3)}</span> <span style="color:${color};font-size:11px">(${sign}${diff.toFixed(3)})</span></span>`;
    html += `</div>`;
  });
  html += '</div>';
  el.innerHTML = html;
}

function recordScore(courtIdx) {
  const a = parseInt(document.getElementById('scoreA_' + courtIdx).value);
  const b = parseInt(document.getElementById('scoreB_' + courtIdx).value);
  if (isNaN(a) || isNaN(b) || a < 0 || b < 0) return alert('Enter valid scores.');
  if (a === b) return alert('Scores can\'t be tied.');
  state.pendingResults[courtIdx] = { winner: a > b ? 'A' : 'B', scoreA: a, scoreB: b };
  saveState();
  render();
}

function recordResult(courtIdx, winner) {
  state.pendingResults[courtIdx] = winner;
  saveState();
  render();
}

function clearResult(courtIdx) {
  delete state.pendingResults[courtIdx];
  saveState();
  render();
}

function undoRound() {
  if (!state.prevState) {
    // No previous round — offer to go back to setup
    if (!confirm('Go back to the starting screen?')) return;
    state = { players: [], round: 1, history: [], pendingResults: {}, prevState: null };
    db.remove();
    document.getElementById('setup').style.display = 'block';
    document.getElementById('game').style.display = 'none';
    document.getElementById('history').innerHTML = '';
    return;
  }
  if (!confirm('Undo last round?')) return;
  const prev = JSON.parse(state.prevState);
  state.players = prev.players;
  state.round = prev.round;
  state.history = prev.history;
  state.pendingResults = prev.pendingResults;
  state.prevState = null;
  saveState();
  render();
}

function resolveRound() {
  // Save snapshot for undo
  state.prevState = JSON.stringify({ players: state.players, round: state.round, history: state.history, pendingResults: state.pendingResults });
  const numCourts = state.players.length / 4;
  let roundLog = `<strong>Round ${state.round}:</strong><br>`;
  const moves = [];

  for (let ci = 0; ci < numCourts; ci++) {
    const r = state.pendingResults[ci];
    const w = (typeof r === 'object') ? r.winner : r;
    const base = ci * 4;
    const winners = w === 'A' ? [0, 3] : [1, 2];
    const losers = w === 'A' ? [1, 2] : [0, 3];
    winners.forEach(i => { state.players[base + i].consecLosses = 0; });
    losers.forEach(i => { state.players[base + i].consecLosses += 1; });
    const wNames = winners.map(i => state.players[base + i].name).join(' & ');
    const lNames = losers.map(i => state.players[base + i].name).join(' & ');
    const scoreStr = (typeof r === 'object' && r.scoreA !== undefined) ? ` (${r.scoreA}–${r.scoreB})` : '';
    const cl = (state.courtLabels && state.courtLabels[ci]) || ci + 1;
    roundLog += `Court ${cl}: 🏆 ${wNames} beat ${lNames}${scoreStr}<br>`;
  }

  // DUPR simulation
  let duprLog = [];
  if (state.duprMode && state.players.some(p => p.dupr > 0)) {
    for (let ci = 0; ci < numCourts; ci++) {
      const r = state.pendingResults[ci];
      const w = (typeof r === 'object') ? r.winner : r;
      const base = ci * 4;
      const winIdxs = w === 'A' ? [0, 3] : [1, 2];
      const loseIdxs = w === 'A' ? [1, 2] : [0, 3];
      const wScore = (typeof r === 'object' && r.scoreA !== undefined) ? (w === 'A' ? r.scoreA : r.scoreB) : null;
      const lScore = (typeof r === 'object' && r.scoreA !== undefined) ? (w === 'A' ? r.scoreB : r.scoreA) : null;
      duprLog = duprLog.concat(updateSimDupr(state.players, base, winIdxs, loseIdxs, wScore, lScore));
    }
  }

  const newCourts = [];
  for (let ci = 0; ci < numCourts; ci++) {
    const r = state.pendingResults[ci];
    const w = (typeof r === 'object') ? r.winner : r;
    const base = ci * 4;
    const winIdxs = w === 'A' ? [0, 3] : [1, 2];
    const loseIdxs = w === 'A' ? [1, 2] : [0, 3];
    const winPlayers = winIdxs.map(i => state.players[base + i]);
    const losePlayers = loseIdxs.map(i => state.players[base + i]);
    newCourts.push([winPlayers[0], winPlayers[1], losePlayers[0], losePlayers[1]]);
  }

  for (let ci = 0; ci < numCourts - 1; ci++) {
    const dropper = newCourts[ci][3];
    const promoter = newCourts[ci + 1][0];
    moves.push(`⬇️ ${dropper.name} drops from Court ${ci+1} → Court ${ci+2} (Seed 1)`);
    moves.push(`⬆️ ${promoter.name} promotes from Court ${ci+2} → Court ${ci+1} (Seed 4)`);
    newCourts[ci + 1][0] = dropper;
    dropper.consecLosses = 0;
    newCourts[ci][3] = promoter;
    promoter.consecLosses = 0;
  }

  for (let ci = 0; ci < numCourts - 1; ci++) {
    const seed3 = newCourts[ci][2];
    if (seed3.consecLosses >= 2) {
      const promoter2 = newCourts[ci + 1][1];
      moves.push(`⬇️ ${seed3.name} (2 consecutive losses) drops from Court ${ci+1} → Court ${ci+2} (Seed 2)`);
      moves.push(`⬆️ ${promoter2.name} promotes from Court ${ci+2} → Court ${ci+1} (Seed 3)`);
      newCourts[ci + 1][1] = seed3;
      seed3.consecLosses = 0;
      newCourts[ci][2] = promoter2;
      promoter2.consecLosses = 0;
    }
  }

  if (moves.length) roundLog += `<br><em>Players rotated between courts.</em>`;
  else roundLog += `<br><em>No court changes this round.</em>`;
  if (duprLog.length) roundLog += `<br><strong>📈 DUPR Sim:</strong><br>` + duprLog.map(d => `&nbsp;&nbsp;${d.name}: ${d.change}`).join('<br>');

  state.players = newCourts.flat();
  state.history.push(roundLog);
  state.round++;
  state.pendingResults = {};
  saveState();
  render();
}

function getPlayerNames() {
  return [...document.querySelectorAll('#playerList .player-row .name-input')].map(i => i.value.trim()).filter(Boolean);
}

function getPlayerDuprs() {
  return [...document.querySelectorAll('#playerList .player-row .dupr-input')].map(i => parseFloat(i.value) || 0);
}

function renderPlayerList(names, duprs) {
  duprs = duprs || [];
  const list = document.getElementById('playerList');
  list.innerHTML = '';
  names.forEach((name, i) => {
    const row = document.createElement('div');
    row.className = 'player-row';
    row.innerHTML = `<span class="seed-label">${i+1}.</span><button class="move-btn" onclick="movePlayer(${i},-1)">▲</button><button class="move-btn" onclick="movePlayer(${i},1)">▼</button><input class="name-input" value="${name}"><input class="dupr-input" value="${duprs[i] || ''}" placeholder="DUPR"><button class="move-btn" onclick="jumpPlayer(${i})" title="Move to position">#</button><button class="remove-btn" onclick="removePlayer(${i})">✕</button>`;
    list.appendChild(row);
  });
}

function movePlayer(idx, dir) {
  const names = getPlayerNames(), duprs = getPlayerDuprs();
  const newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= names.length) return;
  [names[idx], names[newIdx]] = [names[newIdx], names[idx]];
  [duprs[idx], duprs[newIdx]] = [duprs[newIdx], duprs[idx]];
  renderPlayerList(names, duprs);
}

function removePlayer(idx) {
  const names = getPlayerNames(), duprs = getPlayerDuprs();
  names.splice(idx, 1);
  duprs.splice(idx, 1);
  renderPlayerList(names, duprs);
}

function jumpPlayer(idx) {
  const names = getPlayerNames(), duprs = getPlayerDuprs();
  const pos = prompt(`Move "${names[idx]}" to which position? (1-${names.length})`);
  if (!pos) return;
  const newIdx = parseInt(pos) - 1;
  if (isNaN(newIdx) || newIdx < 0 || newIdx >= names.length) return alert('Invalid position.');
  const player = names.splice(idx, 1)[0];
  const dupr = duprs.splice(idx, 1)[0];
  names.splice(newIdx, 0, player);
  duprs.splice(newIdx, 0, dupr);
  renderPlayerList(names, duprs);
}

function renumberSeeds() {
  document.querySelectorAll('#playerList .player-row .seed-label').forEach((el, i) => el.textContent = (i+1) + '.');
}

function addPlayerRow() {
  const names = getPlayerNames(), duprs = getPlayerDuprs();
  names.push('');
  duprs.push(0);
  renderPlayerList(names, duprs);
  const inputs = document.querySelectorAll('#playerList .player-row .name-input');

function sortByDupr() {
  const names = getPlayerNames(), duprs = getPlayerDuprs();
  const players = names.map((n, i) => ({ n, d: duprs[i] }));
  players.sort((a, b) => b.d - a.d);
  renderPlayerList(players.map(p => p.n), players.map(p => p.d));
}

function showDuprLogin() {
  document.getElementById('duprModal').style.display = 'block';
  document.getElementById('duprStatus').textContent = '';
}

function fuzzyMatchPlayer(name, hits) {
  if (!hits.length) return null;
  const norm = s => s.toLowerCase().replace(/[^a-z]/g, '');
  const tokens = name.toLowerCase().split(/\s+/);
  const nameNorm = norm(name);

  let best = null, bestScore = 0;
  for (const h of hits) {
    if (!h.fullName) continue;
    const fn = h.fullName.toLowerCase();
    const fnNorm = norm(h.fullName);
    let score = 0;
    if (fn === name.toLowerCase()) return h;
    const tokensFound = tokens.filter(t => fn.includes(t)).length;
    score += tokensFound * 3;
    const hParts = fn.split(/\s+/);
    if (tokens.length > 1 && hParts.length > 1 && hParts[hParts.length - 1] === tokens[tokens.length - 1]) score += 5;
    if (tokens[0] && hParts[0] && (hParts[0].startsWith(tokens[0]) || tokens[0].startsWith(hParts[0]))) score += 2;
    if (fnNorm.includes(nameNorm) || nameNorm.includes(fnNorm)) score += 2;
    if (score > bestScore) { bestScore = score; best = h; }
  }
  return bestScore >= 3 ? best : hits[0];
}

async function fetchDuprRatings() {
  const email = document.getElementById('duprEmail').value.trim();
  const pass = document.getElementById('duprPass').value;
  const status = document.getElementById('duprStatus');
  document.querySelectorAll('#duprPicker').forEach(el => el.remove());
  if (!email || !pass) return status.textContent = 'Enter email and password.';

  const names = getPlayerNames();
  if (!names.length) return status.textContent = 'Add players first.';

  status.textContent = '🔄 Logging in to DUPR...';
  status.style.color = '#aaa';

  try {
    const loginRes = await fetch(duprUrl('/auth/v1.0/login/'), {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password: pass })
    });
    const loginData = await loginRes.json();
    if (loginData.status !== 'SUCCESS') {
      status.style.color = '#ff6b6b';
      return status.textContent = '❌ Login failed: ' + (loginData.message || 'Invalid credentials');
    }
    const token = loginData.result.accessToken;

    // Get logged-in user's own profile for self-match
    let selfName = null, selfRatings = null;
    const u = loginData.result.user;
    if (u) {
      selfName = u.fullName || u.name || ((u.firstName || '') + ' ' + (u.lastName || '')).trim();
      selfRatings = u.ratings;
      if (!selfRatings && u.id) {
        try {
          const pRes = await fetch(duprUrl(`/player/v1.0/${u.id}`), { headers: { 'Authorization': 'Bearer ' + token } });
          const pData = await pRes.json();
          if (pData.result) { selfRatings = pData.result.ratings; }
        } catch (e) {}
      }
    }

    const duprs = getPlayerDuprs();
    let found = 0;
    const allResults = [];
    for (let i = 0; i < names.length; i++) {
      status.textContent = `🔄 Looking up ${names[i]}... (${i+1}/${names.length})`;
      if (selfName && selfRatings) {
        const norm = s => s.toLowerCase().replace(/[^a-z]/g, '');
        if (norm(names[i]) === norm(selfName) || selfName.toLowerCase().includes(names[i].toLowerCase()) || names[i].toLowerCase().includes(selfName.toLowerCase())) {
          const rating = parseFloat(selfRatings.doubles) || parseFloat(selfRatings.singles) || 0;
          if (rating > 0) { duprs[i] = rating; found++; allResults.push({ idx: i, name: names[i], self: true }); continue; }
        }
      }
      try {
        const doSearch = async (q) => {
          const r = await fetch(duprUrl('/player/v1.0/search'), {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
            body: JSON.stringify({ query: q, limit: 10, offset: 0, filter: { lat: 51.05, lng: -114.07, radiusInMeters: 1000000 }, includeUnclaimedPlayers: false })
          });
          return r.json();
        };
        let searchData = await doSearch(names[i]);
        if (searchData.status === 'SUCCESS' && searchData.result && (!searchData.result.hits || !searchData.result.hits.length)) {
          const parts = names[i].trim().split(/\s+/);
          if (parts.length > 1) searchData = await doSearch(parts[parts.length - 1]);
        }
        const hits = (searchData.status === 'SUCCESS' && searchData.result && searchData.result.hits) || [];
        const autoMatch = hits.length ? fuzzyMatchPlayer(names[i], hits) : null;
        const autoRating = autoMatch?.ratings ? (parseFloat(autoMatch.ratings.doubles) || parseFloat(autoMatch.ratings.singles) || 0) : 0;
        if (autoRating > 0) { duprs[i] = autoRating; found++; }
        allResults.push({ idx: i, name: names[i], hits, autoMatch, autoRating });
      } catch (e) { allResults.push({ idx: i, name: names[i], hits: [], autoMatch: null, autoRating: 0 }); }
    }

    const combined0 = names.map((n, i) => ({ n, d: duprs[i] }));
    combined0.sort((a, b) => b.d - a.d);
    const sortedNames = combined0.map(p => p.n), sortedDuprs = combined0.map(p => p.d);
    renderPlayerList(sortedNames, sortedDuprs);
    status.style.color = '#4ecca3';
    status.innerHTML = `✅ Auto-filled ${found}/${names.length} players. Review & correct below:`;
    const pickerDiv = document.createElement('div');
    pickerDiv.id = 'duprPicker';
    pickerDiv.style.cssText = 'margin-top:8px;max-height:400px;overflow-y:auto';
    const buildSelect = (idx, hits, autoMatch) => {
      let html = `<select data-idx="${idx}" style="background:#16213e;color:#eee;border:1px solid #333;border-radius:4px;padding:4px;font-size:12px;min-width:200px">`;
      html += `<option value="">Skip (${hits.length} results)</option>`;
      hits.forEach(h => {
        const name = h.fullName || h.name || 'Unknown';
        const rating = h.ratings ? (parseFloat(h.ratings.doubles) || parseFloat(h.ratings.singles) || 0) : 0;
        const ratingStr = rating > 0 ? ` (${rating})` : ' (NR)';
        const selected = autoMatch && name === autoMatch.fullName ? ' selected' : '';
        html += `<option value="${rating}"${selected}>${name}${ratingStr}</option>`;
      });
      html += `</select>`;
      return html;
    };
    allResults.forEach(r => {
      const row = document.createElement('div');
      row.style.cssText = 'padding:6px 0;border-bottom:1px solid #1a1a2e;display:flex;align-items:center;gap:6px;flex-wrap:wrap';
      if (r.self) {
        row.innerHTML = `<span style="color:#4ecca3">✅ ${r.name} → self (${duprs[r.idx]})</span>`;
      } else {
        let html = `<span style="color:#aaa;min-width:90px">${r.name} (${r.hits.length} hits) →</span>`;
        html += buildSelect(r.idx, r.hits, r.autoMatch);
        html += `<input data-ridx="${r.idx}" placeholder="Re-search name" style="width:120px;padding:4px;border-radius:4px;border:1px solid #333;background:#16213e;color:#eee;font-size:12px">`;
        html += `<button data-ridx="${r.idx}" style="padding:4px 8px;font-size:11px;margin:0;background:#0f3460">🔍</button>`;
        row.innerHTML = html;
        row.querySelector(`button[data-ridx="${r.idx}"]`).onclick = async function() {
          const input = row.querySelector(`input[data-ridx="${r.idx}"]`);
          const q = input.value.trim();
          if (!q) return;
          try {
            const sr = await fetch(duprUrl('/player/v1.0/search'), {
              method: 'POST',
              headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
              body: JSON.stringify({ query: q, limit: 10, offset: 0, filter: { lat: 51.05, lng: -114.07, radiusInMeters: 1000000 }, includeUnclaimedPlayers: false })
            });
            const sd = await sr.json();
            const newHits = (sd.status === 'SUCCESS' && sd.result && sd.result.hits) || [];
            const sel = row.querySelector(`select[data-idx="${r.idx}"]`);
            sel.outerHTML = buildSelect(r.idx, newHits, null);
          } catch (e) {}
        };
      }
      pickerDiv.appendChild(row);
    });
    const applyBtn = document.createElement('button');
    applyBtn.textContent = '✅ Apply Selections';
    applyBtn.style.cssText = 'margin-top:10px;padding:8px 16px';
    applyBtn.onclick = () => {
      pickerDiv.querySelectorAll('select').forEach(sel => {
        const idx = parseInt(sel.dataset.idx);
        const val = parseFloat(sel.value) || 0;
        if (val > 0) duprs[idx] = val;
      });
      let applied = duprs.filter(d => d > 0).length;
      const combined = names.map((n, i) => ({ n, d: duprs[i] }));
      combined.sort((a, b) => b.d - a.d);
      renderPlayerList(combined.map(p => p.n), combined.map(p => p.d));
      // Hide rows that have a rating, keep unmatched visible
      pickerDiv.querySelectorAll('[data-idx]').forEach(sel => {
        const idx = parseInt(sel.dataset.idx);
        if (duprs[idx] > 0) sel.closest('div').style.display = 'none';
      });
      const remaining = names.filter((_, i) => !duprs[i] || duprs[i] <= 0).length;
      if (remaining === 0) { pickerDiv.remove(); }
      status.style.color = '#4ecca3';
      status.textContent = remaining > 0
        ? `✅ Applied ${applied}/${names.length} ratings. ${remaining} still unmatched below:`
        : `✅ Applied DUPR ratings for ${applied}/${names.length} players (sorted by rating).`;
    };
    pickerDiv.appendChild(applyBtn);
    status.parentNode.insertBefore(pickerDiv, status.nextSibling);
    document.getElementById('duprPass').value = '';
  } catch (e) {
    status.style.color = '#ff6b6b';
    status.textContent = '❌ Error: ' + e.message;
  }
}

function showPastSessions() {
  const list = document.getElementById('pastList');
  list.innerHTML = '<div style="color:#aaa">Loading...</div>';
  document.getElementById('pastSessions').style.display = 'block';
  firebase.database().ref('dev-' + sessionKey + '/archive').once('value', snap => {
    const data = snap.val();
    if (!data) { list.innerHTML = '<div style="color:#aaa">No past sessions found.</div>'; return; }
    let html = '';
    Object.entries(data).sort((a, b) => b[1].sessionStart.localeCompare(a[1].sessionStart)).forEach(([archKey, s]) => {
      const start = new Date(s.sessionStart).toLocaleString();
      const end = s.sessionEnd ? new Date(s.sessionEnd).toLocaleString() : '?';
      const dateLabel = s.sessionDate || 'Custom Game';
      const playerNames = s.players ? s.players.map(p => p.name || p).filter(Boolean) : [];
      const playerDuprs = s.players ? s.players.map(p => p.dupr || 0) : [];
      html += `<div style="background:#16213e;padding:12px;border-radius:8px;margin-bottom:10px">`;
      html += `<div style="display:flex;justify-content:space-between;align-items:center;gap:6px">`;
      html += `<div style="font-weight:600;color:#4ecca3;font-size:16px">${dateLabel}</div>`;
      html += `<div style="display:flex;gap:4px">`;
      if (playerNames.length) html += `<button onclick='reopenSession(${JSON.stringify(playerNames)},${JSON.stringify(playerDuprs)})' style="margin:0;padding:4px 10px;font-size:12px;background:#4ecca3;color:#1a1a2e">🔄 Reopen</button>`;
      html += `<button onclick="deletePastSession('${archKey}')" style="margin:0;padding:4px 10px;font-size:12px;background:#e94560">🗑️</button>`;
      html += `</div></div>`;
      html += `<div style="font-size:12px;color:#aaa">${start} → ${end} · ${s.rounds} round(s) · ${playerNames.length} players</div>`;
      if (s.history) s.history.forEach(h => { html += `<div class="history-entry">${h}</div>`; });
      html += `</div>`;
    });
    list.innerHTML = html;
  });
}

function reopenSession(names, duprs) {
  document.getElementById('pastSessions').style.display = 'none';
  document.getElementById('numCourts').value = Math.floor(names.length / 4) || 1;
  renderPlayerList(names, duprs);
}

function deletePastSession(archKey) {
  if (!confirm('Delete this past session?')) return;
  firebase.database().ref('dev-' + sessionKey + '/archive/' + archKey).remove().then(() => showPastSessions());
}

const dummyNames = ['Bob','Jim','Bill','Jack','Alice','Tom','Sue','Dan','Mike','Lisa','Chris','Emma','Dave','Sara','Pete','Nina','Greg','Jill','Mark','Amy'];
function getCourtNumbers() {
  return document.getElementById('courtNumbers').value.split(',').map(s => s.trim()).filter(s => s).map(Number).filter(n => n > 0);
}

function updateDummyNames() {
  const n = getCourtNumbers().length * 4;
  if (n > 0 && !document.getElementById('dateSelect').value) {
    renderPlayerList(dummyNames.slice(0, n));
  }
}

const DEFAULT_DOC_ID = '12111pYeuP-AgHln3_F2Fkha8jMoTxqInJQK-HX_r9ss';
let scheduleData = {};

function getDocExportUrl() {
  const stored = localStorage.getItem('pb_doc_id');
  const id = stored || DEFAULT_DOC_ID;
  return 'https://docs.google.com/document/d/' + id + '/export?format=txt';
}

function extractDocId(input) {
  const m = input.match(/\/d\/([a-zA-Z0-9_-]+)/);
  if (m) return m[1];
  if (/^[a-zA-Z0-9_-]{20,}$/.test(input.trim())) return input.trim();
  return null;
}

function saveDocUrl() {
  const input = document.getElementById('docUrlInput').value.trim();
  if (!input) { localStorage.removeItem('pb_doc_id'); fetchSchedule(); return; }
  const id = extractDocId(input);
  if (!id) { alert('Could not parse a Google Doc ID from that input.'); return; }
  localStorage.setItem('pb_doc_id', id);
  document.getElementById('docUrlInput').value = 'https://docs.google.com/document/d/' + id + '/edit';
  fetchSchedule();
}

function initDocInput() {
  const id = localStorage.getItem('pb_doc_id') || DEFAULT_DOC_ID;
  document.getElementById('docUrlInput').value = 'https://docs.google.com/document/d/' + id + '/edit';
}

function fetchSchedule() {
  document.getElementById('dateSelect').innerHTML = '<option value="">Loading...</option>';
  fetch(getDocExportUrl())
    .then(r => r.text())
    .then(text => {
      scheduleData = {};
      // Find all date headers and their positions
      const datePattern = /(?:WED|FRI|MON|TUE|THU|SAT|SUN)\s+[A-Z]+\s+\d+/gi;
      const headers = [];
      let m;
      while ((m = datePattern.exec(text)) !== null) headers.push({ key: m[0].trim(), idx: m.index + m[0].length });

      // Extract numbered entries from a text chunk
      function extractPlayers(body) {
        const players = [];
        const re = /(\d+)\.\s*([^0-9?][^0-9]*?)(?=\s*\d+\.|$)/g;
        let pm;
        while ((pm = re.exec(body)) !== null) {
          const name = pm[2].trim().replace(/\.+$/, '');
          if (name && name !== '?') players.push(name);
        }
        // Last entry may have trailing waitlist names — cap to 2 words
        if (players.length) {
          const last = players[players.length - 1].split(/\s+/);
          if (last.length > 2) players[players.length - 1] = last.slice(0, 2).join(' ');
        }
        return players;
      }

      headers.forEach((h, i) => {
        const nextStart = i + 1 < headers.length ? headers[i + 1].idx - headers[i + 1].key.length : undefined;
        const body = text.substring(h.idx, nextStart);
        // Split body at every numbering restart (where "1." appears after a higher number)
        const chunks = [];
        const numRe = /(\d+)\.\s*/g;
        let nm, lastNum = 0, splitPoints = [];
        while ((nm = numRe.exec(body)) !== null) {
          const n = parseInt(nm[1]);
          if (n === 1 && lastNum > 1) splitPoints.push(nm.index);
          lastNum = n;
        }

        if (splitPoints.length > 0) {
          let prev = 0;
          splitPoints.forEach(sp => { chunks.push(body.substring(prev, sp)); prev = sp; });
          chunks.push(body.substring(prev));
          // Assign chunks to empty preceding date headers, last chunk = this date
          const emptyBefore = [];
          for (let j = i - 1; j >= 0 && !scheduleData[headers[j].key]; j--) emptyBefore.unshift(j);
          for (let c = 0; c < chunks.length - 1 && c < emptyBefore.length; c++) {
            const p = extractPlayers(chunks[c]);
            if (p.length) scheduleData[headers[emptyBefore[c]].key] = p;
          }
          const p = extractPlayers(chunks[chunks.length - 1]);
          if (p.length) scheduleData[h.key] = p;
        } else {
          const p = extractPlayers(body);
          if (p.length) scheduleData[h.key] = p;
        }
      });

      const sel = document.getElementById('dateSelect');
      sel.innerHTML = '<option value="">-- Select a date --</option>';
      Object.keys(scheduleData).forEach(d => {
        const opt = document.createElement('option');
        opt.value = d;
        opt.textContent = d + ' (' + scheduleData[d].length + ' players)';
        sel.appendChild(opt);
      });
    })
    .catch(() => {
      document.getElementById('dateSelect').innerHTML = '<option value="">Failed to load schedule</option>';
    });
}

function onDateSelect() {
  const key = document.getElementById('dateSelect').value;
  if (!key || !scheduleData[key]) return;
  const players = scheduleData[key];
  renderPlayerList(players);
  const courts = Math.floor(players.length / 4);
  document.getElementById('courtNumbers').value = Array.from({length: courts}, (_, i) => i + 1).join(', ');
}
