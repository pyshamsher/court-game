<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pickleball Court Tracker [DEV]</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; padding: 20px; }
  h1 { text-align: center; margin-bottom: 20px; color: #e94560; }
  #setup, #game { max-width: 800px; margin: 0 auto; }
  #game { display: none; }
  .setup-form { background: #16213e; padding: 20px; border-radius: 12px; }
  .setup-form label { display: block; margin-bottom: 6px; font-weight: 600; }
  .setup-form textarea { width: 100%; height: 120px; padding: 10px; border-radius: 8px; border: none; font-size: 14px; background: #0f3460; color: #eee; resize: vertical; }
  .setup-form small { color: #aaa; }
  button { background: #e94560; color: #fff; border: none; padding: 10px 24px; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 600; margin-top: 12px; }
  button:hover { background: #c73650; }
  .court { background: #16213e; border-radius: 12px; padding: 16px; margin-bottom: 20px; }
  .court h2 { color: #e94560; margin-bottom: 12px; font-size: 18px; }
  .matchups { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 12px; }
  .match { background: #0f3460; border-radius: 8px; padding: 12px; flex: 1; min-width: 200px; }
  .match .vs { text-align: center; color: #e94560; font-weight: 700; margin: 4px 0; }
  .match .team { display: flex; justify-content: space-between; align-items: center; padding: 4px 0; }
  .match .team .seed { color: #aaa; font-size: 12px; margin-right: 8px; }
  .match .team .name { font-weight: 600; font-size: 16px; }
  .match button { width: 100%; margin-top: 8px; padding: 8px; font-size: 13px; }
  .players-list { display: flex; gap: 8px; flex-wrap: wrap; }
  .players-list .player { background: #0f3460; padding: 6px 12px; border-radius: 6px; font-size: 13px; }
  .player .seed-num { color: #e94560; font-weight: 700; margin-right: 4px; }
  .player .consec { color: #ff6b6b; font-size: 11px; margin-left: 4px; }
  .round-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .round-header h2 { color: #e94560; }
  #history { max-width: 800px; margin: 20px auto 0; }
  #history h2 { color: #e94560; margin-bottom: 10px; }
  .history-entry { background: #16213e; padding: 10px 14px; border-radius: 8px; margin-bottom: 6px; font-size: 13px; color: #ccc; }
  .sync-status { text-align: center; font-size: 12px; color: #4ecca3; margin-bottom: 10px; }
  #lock { display: flex; justify-content: center; align-items: center; min-height: 60vh; }
  #lock .lock-box { background: #16213e; padding: 30px; border-radius: 12px; text-align: center; }
  #lock input { padding: 10px; border-radius: 8px; border: none; background: #0f3460; color: #eee; font-size: 16px; text-align: center; width: 200px; margin-top: 10px; }
  #lock .error { color: #ff6b6b; font-size: 13px; margin-top: 8px; }
  #app { display: none; }
  .player-row { display: flex; align-items: center; gap: 6px; padding: 6px 8px; margin: 4px 0; background: #0f3460; border-radius: 8px; }
  .player-row .seed-label { color: #e94560; font-weight: 700; min-width: 28px; }
  .player-row input.name-input { flex: 1; padding: 6px; border-radius: 6px; border: none; background: #16213e; color: #eee; font-size: 14px; }
  .player-row input.dupr-input { width: 50px; padding: 6px; border-radius: 6px; border: none; background: #16213e; color: #4ecca3; font-size: 13px; text-align: center; }
  .player-row .move-btn { background: none; border: none; color: #4ecca3; cursor: pointer; font-size: 18px; padding: 0 2px; margin: 0; line-height: 1; }
  .player-row .move-btn:hover { color: #e94560; }
  .player-row .remove-btn { background: none; border: none; color: #ff6b6b; cursor: pointer; font-size: 16px; padding: 0 4px; margin: 0; }
  .dupr-badge { color: #4ecca3; font-size: 11px; margin-left: 4px; }
</style>
</head>
<body>

<h1>🏓 Pickleball Court Tracker <span style="color:#ff6b6b;font-size:14px;vertical-align:super">DEV</span></h1>

<div id="lock">
  <div class="lock-box">
    <label style="font-weight:600;font-size:16px">🔒 Enter Passcode</label><br>
    <input type="password" id="passcodeInput" placeholder="Passcode" onkeydown="if(event.key==='Enter')checkPasscode()">
    <br><button onclick="checkPasscode()">Enter</button>
    <div class="error" id="lockError"></div>
  </div>
</div>

<div id="app">
<div class="sync-status" id="syncStatus">🔄 Select or create a session</div>

<div id="sessionPicker" style="margin-bottom:12px">
  <div style="display:flex;gap:8px;margin-bottom:10px">
    <button onclick="document.getElementById('newSessionForm').style.display='block';document.getElementById('sessionList').style.display='none'" style="flex:1;padding:10px;background:#4ecca3;color:#1a1a2e;font-weight:700">➕ New Session</button>
    <button onclick="loadSessionList();document.getElementById('newSessionForm').style.display='none'" style="flex:1;padding:10px;background:#0f3460">📋 Join Session</button>
  </div>
  <div id="newSessionForm" style="display:none;background:#0f3460;padding:12px;border-radius:8px;margin-bottom:8px">
    <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
      <input id="sessionDate" type="date" style="padding:8px;border-radius:8px;border:none;background:#16213e;color:#eee;font-size:14px">
      <input id="locationInput" placeholder="Group name (optional)" onkeydown="if(event.key==='Enter')switchLocation()" style="padding:8px;border-radius:8px;border:none;background:#16213e;color:#eee;font-size:14px;flex:1">
      <button onclick="switchLocation()" style="margin:0;padding:8px 16px">Start</button>
    </div>
  </div>
  <div id="sessionList" style="display:none;background:#0f3460;padding:12px;border-radius:8px">
    <div id="sessionListItems" style="max-height:250px;overflow-y:auto"></div>
    <div id="noSessions" style="display:none;color:#aaa;padding:8px">No active sessions found.</div>
  </div>
  <span id="locationLabel" style="color:#4ecca3;font-size:13px"></span>
</div>

<div id="setup">
  <div class="setup-form">
    <label>Load players from schedule:</label>
    <select id="dateSelect" onchange="onDateSelect()" style="width:100%;padding:8px;border-radius:8px;border:none;background:#0f3460;color:#eee;font-size:14px;margin-bottom:12px">
      <option value="">-- Select a date --</option>
    </select>
    <button onclick="fetchSchedule()" style="background:#0f3460;margin-bottom:12px">🔄 Refresh Schedule</button>
    <label>Number of Courts:</label>
    <input type="number" id="numCourts" min="1" value="2" onchange="updateDummyNames()" oninput="updateDummyNames()" style="width:80px;padding:8px;border-radius:8px;border:none;background:#0f3460;color:#eee;font-size:14px;margin-bottom:12px">
    <label>Players (drag to reorder, edit if needed):</label>
    <small>First player = Seed 1 (best). Total players must equal courts × 4.</small>
    <div id="playerList" style="margin-bottom:12px"></div>
    <button onclick="addPlayerRow()" style="background:#0f3460;margin-bottom:8px">+ Add Player</button>
    <button onclick="sortByDupr()" style="background:#0f3460;margin-bottom:8px">📊 Sort by DUPR</button>
    <button onclick="showDuprLogin()" style="background:#0f3460;margin-bottom:8px">🔍 Fetch DUPR Ratings</button>
    <div id="duprModal" style="display:none;background:#0f3460;padding:16px;border-radius:8px;margin-bottom:12px">
      <label style="font-size:13px">Enter your DUPR login to fetch ratings for all players:</label>
      <div style="display:flex;gap:8px;margin-top:8px">
        <input id="duprEmail" placeholder="DUPR Email" style="flex:1;padding:8px;border-radius:6px;border:none;background:#16213e;color:#eee;font-size:13px">
        <input id="duprPass" type="password" placeholder="Password" style="flex:1;padding:8px;border-radius:6px;border:none;background:#16213e;color:#eee;font-size:13px">
        <button onclick="fetchDuprRatings()" style="margin:0;padding:8px 16px">Fetch</button>
        <button onclick="document.getElementById('duprModal').style.display='none'" style="margin:0;background:#16213e;padding:8px">✕</button>
      </div>
      <div id="duprStatus" style="font-size:12px;margin-top:6px;color:#aaa;white-space:pre-wrap;max-height:300px;overflow-y:auto"></div>
    </div>
    <button onclick="startGame()">Start Game</button>
    <button onclick="startRandomGame()" style="background:#0f3460">🎲 Quick Game (no history)</button>
    <button onclick="startRoundRobin()" style="background:#4ecca3;color:#1a1a2e">🔄 Round Robin</button>
    <button onclick="showPastSessions()" style="background:#0f3460">📜 Past Sessions</button>
  </div>
</div>

<div id="pastSessions" style="display:none;max-width:800px;margin:20px auto;">
  <h2 style="color:#e94560;margin-bottom:12px">📜 Past Sessions</h2>
  <div id="pastList"></div>
  <button onclick="document.getElementById('pastSessions').style.display='none'" style="margin-top:10px">← Back</button>
</div>

<div id="game">
  <div class="round-header">
    <h2>Round <span id="roundNum">1</span></h2>
    <div>
      <span id="sessionInfo" style="font-size:12px;color:#aaa;margin-right:12px"></span>
      <button onclick="undoRound()" style="background:#0f3460">↩ Undo</button>
      <button onclick="resetGame()">Reset</button>
      <button onclick="endSession()" style="background:#e94560">🏁 End Session</button>
    </div>
  </div>
  <div id="courts"></div>
</div>

<div id="history"></div>

<div id="rrGame" style="display:none;max-width:800px;margin:0 auto;">
  <div class="round-header">
    <h2>🔄 Round Robin — Round <span id="rrRoundNum">1</span> of <span id="rrTotalRounds">?</span></h2>
    <div>
      <span id="rrSessionInfo" style="font-size:12px;color:#aaa;margin-right:12px"></span>
      <button onclick="resetRR()">Reset</button>
    </div>
  </div>
  <div id="rrCourts"></div>
  <div id="rrStandings" style="margin-top:20px"></div>
  <div id="rrLog" style="margin-top:20px"></div>
</div>

</div><!-- end #app -->

<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-database-compat.js"></script>
<script>
// --- Passcode Protection ---
const PASSCODE = 'pickle2026';

function checkPasscode() {
  const input = document.getElementById('passcodeInput').value;
  if (input === PASSCODE) {
    sessionStorage.setItem('pb_auth', 'true');
    unlock();
  } else {
    document.getElementById('lockError').textContent = 'Wrong passcode. Try again.';
  }
}

function unlock() {
  document.getElementById('lock').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  initApp();
}

// Auto-unlock if already authenticated this session
if (sessionStorage.getItem('pb_auth') === 'true') {
  document.addEventListener('DOMContentLoaded', unlock);
}

// --- App ---
let state = { players: [], round: 1, history: [], pendingResults: {}, prevState: null };
let db;

function initApp() {
  const firebaseConfig = {
  apiKey: "AIzaSyD4C8latdB9eZxVRvk41t_YsZFVrUDFNHA",
  authDomain: "pickleball-tracker-2ce69.firebaseapp.com",
  databaseURL: "https://pickleball-tracker-2ce69-default-rtdb.firebaseio.com",
  projectId: "pickleball-tracker-2ce69",
  storageBucket: "pickleball-tracker-2ce69.firebasestorage.app",
  messagingSenderId: "899482641607",
  appId: "1:899482641607:web:b02e440285628554aa4ae2"
};
  firebase.initializeApp(firebaseConfig);
  let currentLocation = sessionStorage.getItem('pkLocation') || '';
  document.getElementById('sessionDate').value = new Date().toISOString().slice(0, 10);
  if (currentLocation) {
    const parts = currentLocation.split('|');
    if (parts.length === 2) { document.getElementById('sessionDate').value = parts[0]; document.getElementById('locationInput').value = parts[1]; }
    else document.getElementById('locationInput').value = currentLocation;
    document.getElementById('locationLabel').textContent = '✅ ' + currentLocation.replace('|', ' — ');
    db = firebase.database().ref('dev-' + currentLocation.toLowerCase().replace(/[^a-z0-9]/g, '') + '/game');
    initDbListener();
  }

  window.switchLocation = function(sessionKey) {
    let date, name;
    if (sessionKey) {
      const parts = sessionKey.split('|');
      date = parts[0]; name = parts[1] || '';
      document.getElementById('sessionDate').value = date;
      document.getElementById('locationInput').value = name;
    } else {
      date = document.getElementById('sessionDate').value;
      name = document.getElementById('locationInput').value.trim();
    }
    if (!date) return alert('Select a date.');
    currentLocation = name ? date + '|' + name : date;
    const key = currentLocation.toLowerCase().replace(/[^a-z0-9]/g, '');
    sessionStorage.setItem('pkLocation', currentLocation);
    document.getElementById('locationLabel').textContent = '🏷️ ' + date + (name ? ' — ' + name : '') + '  ';
    const changeBtn = document.createElement('a');
    changeBtn.textContent = '(change)';
    changeBtn.style.cssText = 'color:#e94560;cursor:pointer;font-size:12px';
    changeBtn.onclick = () => { sessionStorage.removeItem('pkLocation'); location.reload(); };
    document.getElementById('locationLabel').appendChild(changeBtn);
    document.getElementById('syncStatus').textContent = '🔄 Connecting to server...';
    document.getElementById('sessionPicker').querySelector('#newSessionForm').style.display = 'none';
    document.getElementById('sessionList').style.display = 'none';
    try { document.getElementById('sessionPicker').children[0].style.display = 'none'; } catch(e) {}
    if (db) { db.off(); db = null; }
    if (rrDb) { rrDb.off(); rrDb = null; }
    db = firebase.database().ref('dev-' + key + '/game');
    document.getElementById('setup').style.display = 'block';
    document.getElementById('game').style.display = 'none';
    initDbListener();
    listenRR();
  }

  // Load active sessions list
  window.loadSessionList = function() {
    document.getElementById('sessionList').style.display = 'block';
    document.getElementById('sessionListItems').innerHTML = '<div style="color:#aaa;padding:8px">Loading...</div>';
    document.getElementById('noSessions').style.display = 'none';
    // Use shallow REST query to avoid downloading all data
    fetch('https://pickleball-tracker-2ce69-default-rtdb.firebaseio.com/.json?shallow=true')
      .then(r => r.json())
      .then(keys => {
        if (!keys) { document.getElementById('sessionListItems').innerHTML = ''; document.getElementById('noSessions').style.display = 'block'; return; }
        const devKeys = Object.keys(keys).filter(k => k.startsWith('dev-'));
        if (!devKeys.length) { document.getElementById('sessionListItems').innerHTML = ''; document.getElementById('noSessions').style.display = 'block'; return; }
        // Fetch just the game node for each dev key
        const promises = devKeys.map(k =>
          firebase.database().ref(k + '/game').once('value').then(snap => ({ key: k.replace('dev-', ''), data: snap.val() }))
        );
        return Promise.all(promises);
      })
      .then(results => {
        if (!results) return;
        const items = document.getElementById('sessionListItems');
        const sessions = results.filter(r => r.data && r.data.players && r.data.players.length)
          .map(r => {
            const name = r.data.sessionName ? r.data.sessionDate + ' — ' + r.data.sessionName : (r.data.sessionDate || r.key);
            return { key: r.key, playerCount: r.data.players.length, round: r.data.round || 1, label: name };
          });
        if (!sessions.length) { items.innerHTML = ''; document.getElementById('noSessions').style.display = 'block'; return; }
        items.innerHTML = sessions.map(s =>
          `<div onclick="switchLocation('${s.key}')" style="padding:10px;margin:4px 0;background:#16213e;border-radius:6px;cursor:pointer;display:flex;justify-content:space-between">
          <span>🏓 ${s.label}</span><span style="color:#4ecca3">${s.playerCount} players · Round ${s.round}</span></div>`
        ).join('');
      })
      .catch(() => { document.getElementById('sessionListItems').innerHTML = ''; document.getElementById('noSessions').style.display = 'block'; });
  }
  if (!currentLocation) loadSessionList();

  function getArchivePath() { return 'dev-' + currentLocation.toLowerCase().replace(/[^a-z0-9]/g, '') + '/archive'; }
  window.getArchivePath = getArchivePath;
  function getRrPath() { return 'dev-' + currentLocation.toLowerCase().replace(/[^a-z0-9]/g, '') + '/rr'; }
  window.getRrPath = getRrPath;

  function initDbListener() {
  // Listen for real-time updates from Firebase
  db.on('value', (snapshot) => {
  const data = snapshot.val();
  if (data && data.players && data.players.length) {
    state = data;
    state.pendingResults = state.pendingResults || {};
    state.history = state.history || [];
    document.getElementById('setup').style.display = 'none';
    document.getElementById('game').style.display = 'block';
    render();
  } else {
    document.getElementById('setup').style.display = 'block';
    document.getElementById('game').style.display = 'none';
  }
  document.getElementById('syncStatus').textContent = '✅ Connected — live sync active';
  });
  }
  if (currentLocation) initDbListener();
  fetchSchedule();
  renderPlayerList(dummyNames.slice(0, 8));
  listenRR();
} // end initApp

function saveState() {
  if (!db) return;
  db.set(state).then(() => {
    document.getElementById('syncStatus').textContent = '✅ Synced — all devices see the same game';
  }).catch(() => {
    document.getElementById('syncStatus').textContent = '❌ Sync failed — check connection';
  });
}

function startGame() {
  if (!db) { switchLocation(); if (!db) return; }
  const names = getPlayerNames();
  const duprs = getPlayerDuprs();
  const numCourts = parseInt(document.getElementById('numCourts').value);
  const needed = numCourts * 4;
  if (!numCourts || numCourts < 1) return alert('Enter a valid number of courts.');
  if (names.length !== needed) return alert(`You need exactly ${needed} players for ${numCourts} courts. You entered ${names.length}.`);
  state.players = names.map((name, i) => ({ name, seed: i + 1, consecLosses: 0, dupr: duprs[i] || 0 }));
  state.round = 1;
  state.history = [];
  state.pendingResults = {};
  state.sessionStart = new Date().toISOString();
  state.sessionDate = document.getElementById('dateSelect').value || 'Custom Game';
  state.sessionName = document.getElementById('locationInput').value.trim() || '';
  state.isQuickGame = false;
  document.getElementById('setup').style.display = 'none';
  document.getElementById('game').style.display = 'block';
  saveState();
  render();
}

function startRandomGame() {
  if (!db) { switchLocation(); if (!db) return; }
  const names = getPlayerNames();
  const duprs = getPlayerDuprs();
  const numCourts = parseInt(document.getElementById('numCourts').value);
  const needed = numCourts * 4;
  if (!numCourts || numCourts < 1) return alert('Enter a valid number of courts.');
  if (names.length !== needed) return alert(`You need exactly ${needed} players for ${numCourts} courts. You entered ${names.length}.`);
  state.players = names.map((name, i) => ({ name, seed: i + 1, consecLosses: 0, dupr: duprs[i] || 0 }));
  state.round = 1;
  state.history = [];
  state.pendingResults = {};
  state.sessionStart = new Date().toISOString();
  state.sessionDate = 'Quick Game';
  state.isQuickGame = true;
  document.getElementById('setup').style.display = 'none';
  document.getElementById('game').style.display = 'block';
  saveState();
  render();
}

function resetGame() {
  if (!confirm('Reset the game for everyone?')) return;
  archiveAndClear();
}

function endSession() {
  if (!confirm('End this session and save to history?')) return;
  // Capture state before anything resets it
  const snap = JSON.parse(JSON.stringify(state));
  const path = getArchivePath();
  // Detach listener so db.remove doesn't trigger state reset
  if (db) db.off();
  let promise = Promise.resolve();
  if (snap.players && snap.players.length && !snap.isQuickGame) {
    const key = (snap.sessionDate || 'Custom') + '_' + (snap.sessionStart || new Date().toISOString()).replace(/[.#$/\[\]]/g, '_');
    promise = firebase.database().ref(path + '/' + key.replace(/[.#$/\[\]]/g, '_')).set({
      sessionDate: snap.sessionDate || 'Custom Game',
      sessionStart: snap.sessionStart,
      sessionEnd: new Date().toISOString(),
      players: snap.players,
      history: snap.history || [],
      rounds: snap.round - 1
    });
  }
  promise.then(() => {
    if (db) db.remove();
    sessionStorage.removeItem('pkLocation');
    location.reload();
  });
}

function archiveAndClear() {
  let promise = null;
  if (state.players && state.players.length && !state.isQuickGame) {
    const key = (state.sessionDate || 'Custom') + '_' + (state.sessionStart || new Date().toISOString()).replace(/[.#$/\[\]]/g, '_');
    const archRef = firebase.database().ref(getArchivePath() + '/' + key.replace(/[.#$/\[\]]/g, '_'));
    promise = archRef.set({
      sessionDate: state.sessionDate || 'Custom Game',
      sessionStart: state.sessionStart,
      sessionEnd: new Date().toISOString(),
      players: state.players,
      history: state.history || [],
      rounds: state.round - 1
    }).then(() => {
      // Clear game after archive is confirmed saved
      state = { players: [], round: 1, history: [], pendingResults: {}, prevState: null };
      if (db) db.remove();
    });
  } else {
    state = { players: [], round: 1, history: [], pendingResults: {}, prevState: null };
    if (db) db.remove();
  }
  document.getElementById('setup').style.display = 'block';
  document.getElementById('game').style.display = 'none';
  document.getElementById('history').innerHTML = '';
  return promise;
}

function getCourts() {
  const courts = [];
  for (let i = 0; i < state.players.length; i += 4) {
    courts.push(state.players.slice(i, i + 4));
  }
  return courts;
}

function fmtDupr(p) { return p.dupr ? ' <span class="dupr-badge">' + p.dupr.toFixed(1) + '</span>' : ''; }

function render() {
  document.getElementById('roundNum').textContent = state.round;
  if (state.sessionStart) {
    let info = '';
    if (state.sessionDate) info += state.sessionDate + ' · ';
    info += 'Started: ' + new Date(state.sessionStart).toLocaleTimeString();
    document.getElementById('sessionInfo').textContent = info;
  }
  const courts = getCourts();
  const numCourts = courts.length;
  let html = '';
  courts.forEach((court, ci) => {
    const allResolved = state.pendingResults[ci] !== undefined;
    html += `<div class="court"><h2>Court ${ci + 1}</h2>`;
    html += `<div class="players-list" style="margin-bottom:10px">`;
    court.forEach((p, si) => {
      html += `<div class="player"><span class="seed-num">#${si+1}</span>${p.name}${p.dupr ? '<span class="dupr-badge">' + p.dupr.toFixed(1) + '</span>' : ''}<span class="consec">${p.consecLosses > 0 ? ' (L×' + p.consecLosses + ')' : ''}</span></div>`;
    });
    html += `</div>`;
    html += `<div class="matchups">`;
    const tA = [court[0], court[3]];
    const tB = [court[1], court[2]];
    html += `<div class="match">`;
    html += `<div style="color:#4ecca3;font-size:14px;font-weight:600;margin-bottom:4px">⬆ Top of the Court</div>`;
    html += `<div class="team"><span class="name">${tA[0].name}${fmtDupr(tA[0])} & ${tA[1].name}${fmtDupr(tA[1])}</span></div>`;
    html += `<div class="vs">VS</div>`;
    html += `<div style="color:#e94560;font-size:14px;font-weight:600;margin-bottom:4px">⬇ Bottom of the Court</div>`;
    html += `<div class="team"><span class="name">${tB[0].name}${fmtDupr(tB[0])} & ${tB[1].name}${fmtDupr(tB[1])}</span></div>`;
    if (!allResolved) {
      html += `<button onclick="recordResult(${ci},'A')">🏆 Top Wins</button>`;
      html += `<button onclick="recordResult(${ci},'B')" style="background:#0f3460;margin-top:4px">🏆 Bottom Wins</button>`;
    } else {
      html += `<div style="text-align:center;color:#4ecca3;margin-top:8px;font-weight:600">✓ Winner: ${state.pendingResults[ci] === 'A' ? 'Top' : 'Bottom'}</div>`;
      html += `<button onclick="clearResult(${ci})" style="background:#0f3460;margin-top:4px;font-size:12px">↩ Change</button>`;
    }
    html += `</div></div></div>`;
  });
  document.getElementById('courts').innerHTML = html;

  if (Object.keys(state.pendingResults).length === numCourts) {
    document.getElementById('courts').innerHTML += `<div style="text-align:center;margin-top:10px"><button onclick="resolveRound()">Apply Results & Next Round →</button></div>`;
  }

  renderHistory();
}

function recordResult(courtIdx, winner) {
  state.pendingResults[courtIdx] = winner;
  saveState();
  render();
}

function clearResult(courtIdx) {
  delete state.pendingResults[courtIdx];
  saveState();
  render();
}

function undoRound() {
  if (!state.prevState) {
    // No previous round — offer to go back to setup
    if (!confirm('Go back to the starting screen?')) return;
    state = { players: [], round: 1, history: [], pendingResults: {}, prevState: null };
    db.remove();
    document.getElementById('setup').style.display = 'block';
    document.getElementById('game').style.display = 'none';
    document.getElementById('history').innerHTML = '';
    return;
  }
  if (!confirm('Undo last round?')) return;
  const prev = JSON.parse(state.prevState);
  state.players = prev.players;
  state.round = prev.round;
  state.history = prev.history;
  state.pendingResults = prev.pendingResults;
  state.prevState = null;
  saveState();
  render();
}

function resolveRound() {
  // Save snapshot for undo
  state.prevState = JSON.stringify({ players: state.players, round: state.round, history: state.history, pendingResults: state.pendingResults });
  const numCourts = state.players.length / 4;
  let roundLog = `<strong>Round ${state.round}:</strong> <span style="color:#aaa;font-size:11px">${new Date().toLocaleString()}</span><br>`;
  const moves = [];

  for (let ci = 0; ci < numCourts; ci++) {
    const w = state.pendingResults[ci];
    const base = ci * 4;
    const winners = w === 'A' ? [0, 3] : [1, 2];
    const losers = w === 'A' ? [1, 2] : [0, 3];
    winners.forEach(i => { state.players[base + i].consecLosses = 0; });
    losers.forEach(i => { state.players[base + i].consecLosses += 1; });
    const wNames = winners.map(i => state.players[base + i].name).join(' & ');
    const lNames = losers.map(i => state.players[base + i].name).join(' & ');
    roundLog += `Court ${ci + 1}: 🏆 ${wNames} beat ${lNames}<br>`;
  }

  const newCourts = [];
  for (let ci = 0; ci < numCourts; ci++) {
    const base = ci * 4;
    const w = state.pendingResults[ci];
    const winIdxs = w === 'A' ? [0, 3] : [1, 2];
    const loseIdxs = w === 'A' ? [1, 2] : [0, 3];
    const winPlayers = winIdxs.map(i => state.players[base + i]);
    const losePlayers = loseIdxs.map(i => state.players[base + i]);
    newCourts.push([winPlayers[0], winPlayers[1], losePlayers[0], losePlayers[1]]);
  }

  for (let ci = 0; ci < numCourts - 1; ci++) {
    const dropper = newCourts[ci][3];
    const promoter = newCourts[ci + 1][0];
    moves.push(`⬇️ ${dropper.name} drops from Court ${ci+1} → Court ${ci+2} (Seed 1)`);
    moves.push(`⬆️ ${promoter.name} promotes from Court ${ci+2} → Court ${ci+1} (Seed 4)`);
    newCourts[ci + 1][0] = dropper;
    dropper.consecLosses = 0;
    newCourts[ci][3] = promoter;
    promoter.consecLosses = 0;
  }

  for (let ci = 0; ci < numCourts - 1; ci++) {
    const seed3 = newCourts[ci][2];
    if (seed3.consecLosses >= 2) {
      const promoter2 = newCourts[ci + 1][1];
      moves.push(`⬇️ ${seed3.name} (2 consecutive losses) drops from Court ${ci+1} → Court ${ci+2} (Seed 2)`);
      moves.push(`⬆️ ${promoter2.name} promotes from Court ${ci+2} → Court ${ci+1} (Seed 3)`);
      newCourts[ci + 1][1] = seed3;
      seed3.consecLosses = 0;
      newCourts[ci][2] = promoter2;
      promoter2.consecLosses = 0;
    }
  }

  if (moves.length) roundLog += `<br><strong>Movements:</strong><br>` + moves.map(m => `&nbsp;&nbsp;${m}`).join('<br>');
  else roundLog += `<br><em>No court changes this round.</em>`;

  state.players = newCourts.flat();
  state.history.push(roundLog);
  state.round++;
  state.pendingResults = {};
  saveState();
  render();
}

function renderHistory() {
  if (!state.history.length) { document.getElementById('history').innerHTML = ''; return; }
  let html = '<h2>History</h2>';
  state.history.slice().reverse().forEach(h => {
    html += `<div class="history-entry">${h}</div>`;
  });
  document.getElementById('history').innerHTML = html;
}

}

function getPlayerDuprs() {
  return [...document.querySelectorAll('#playerList .player-row .dupr-input')].map(i => parseFloat(i.value) || 0);
}

function renderPlayerList(names, duprs) {
  duprs = duprs || [];
  const list = document.getElementById('playerList');
  list.innerHTML = '';
  names.forEach((name, i) => {
    const row = document.createElement('div');
    row.className = 'player-row';

    list.appendChild(row);

function movePlayer(idx, dir) {
  const names = getPlayerNames(), duprs = getPlayerDuprs();
  const newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= names.length) return;
  [names[idx], names[newIdx]] = [names[newIdx], names[idx]];
  [duprs[idx], duprs[newIdx]] = [duprs[newIdx], duprs[idx]];
  renderPlayerList(names, duprs);
}

function removePlayer(idx) {
  const names = getPlayerNames(), duprs = getPlayerDuprs();
  names.splice(idx, 1);
  duprs.splice(idx, 1);
  renderPlayerList(names, duprs);
}

function jumpPlayer(idx) {
  const names = getPlayerNames(), duprs = getPlayerDuprs();
  const pos = prompt(`Move "${names[idx]}" to which position? (1-${names.length})`);
  if (!pos) return;
  const newIdx = parseInt(pos) - 1;
  if (isNaN(newIdx) || newIdx < 0 || newIdx >= names.length) return alert('Invalid position.');
  const player = names.splice(idx, 1)[0];
  const dupr = duprs.splice(idx, 1)[0];
  names.splice(newIdx, 0, player);
  duprs.splice(newIdx, 0, dupr);
  renderPlayerList(names, duprs);
}

function addPlayerRow() {

function fuzzyMatchPlayer(name, hits) {
  if (!hits.length) return null;
  const norm = s => s.toLowerCase().replace(/[^a-z]/g, '');
  const tokens = name.toLowerCase().split(/\s+/);
  const nameNorm = norm(name);

  let best = null, bestScore = 0;
  for (const h of hits) {
    if (!h.fullName) continue;
    const fn = h.fullName.toLowerCase();
    const fnNorm = norm(h.fullName);
    let score = 0;

    // Exact match
    if (fn === name.toLowerCase()) return h;

    // All tokens present in full name
    const tokensFound = tokens.filter(t => fn.includes(t)).length;
    score += tokensFound * 3;

    // Last name match (strongest signal)
    const hParts = fn.split(/\s+/);
    if (tokens.length > 1 && hParts.length > 1 && hParts[hParts.length - 1] === tokens[tokens.length - 1]) score += 5;

    // First name starts with same chars (Bob/Robert won't match, but partial like "Mike"/"Michael" gets a point)
    if (tokens[0] && hParts[0] && (hParts[0].startsWith(tokens[0]) || tokens[0].startsWith(hParts[0]))) score += 2;

    // Normalized containment
    if (fnNorm.includes(nameNorm) || nameNorm.includes(fnNorm)) score += 2;

    if (score > bestScore) { bestScore = score; best = h; }
  }
  // Require at least last name match or 2+ token matches to avoid false positives
  return bestScore >= 3 ? best : hits[0];
}

async function fetchDuprRatings() {
  const email = document.getElementById('duprEmail').value.trim();
  const pass = document.getElementById('duprPass').value;
  const status = document.getElementById('duprStatus');
  document.querySelectorAll('#duprPicker').forEach(el => el.remove());
  if (!email || !pass) return status.textContent = 'Enter email and password.';

  const names = getPlayerNames();
  if (!names.length) return status.textContent = 'Add players first.';

  status.textContent = '🔄 Logging in to DUPR...';
  status.style.color = '#aaa';

  try {
    // Login
    const loginRes = await fetch('https://api.dupr.gg/auth/v1.0/login/', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password: pass })
    });
    const loginData = await loginRes.json();
    if (loginData.status !== 'SUCCESS') {
      status.style.color = '#ff6b6b';
      return status.textContent = '❌ Login failed: ' + (loginData.message || 'Invalid credentials');
    }
    const token = loginData.result.accessToken;

    // Get logged-in user's own profile for self-match
    let selfName = null, selfRatings = null;
    // Try login response user object
    const u = loginData.result.user;
    if (u) {
      selfName = u.fullName || u.name || ((u.firstName || '') + ' ' + (u.lastName || '')).trim();
      selfRatings = u.ratings;
      // If no ratings in user object, try fetching player profile
      if (!selfRatings && u.id) {
        try {
          const pRes = await fetch(`https://api.dupr.gg/player/v1.0/${u.id}`, {
            headers: { 'Authorization': 'Bearer ' + token }
          });
          const pData = await pRes.json();
          if (pData.result) { selfRatings = pData.result.ratings; }
        } catch (e) {}
      }
    }

    // Search each player
    const duprs = getPlayerDuprs();
    let found = 0;
    // Collect all search results first
    const allResults = [];
    for (let i = 0; i < names.length; i++) {
      status.textContent = `🔄 Looking up ${names[i]}... (${i+1}/${names.length})`;
      // Check if this player matches the logged-in user
      if (selfName && selfRatings) {
        const norm = s => s.toLowerCase().replace(/[^a-z]/g, '');
        if (norm(names[i]) === norm(selfName) || selfName.toLowerCase().includes(names[i].toLowerCase()) || names[i].toLowerCase().includes(selfName.toLowerCase())) {
          const rating = parseFloat(selfRatings.doubles) || parseFloat(selfRatings.singles) || 0;
          if (rating > 0) { duprs[i] = rating; found++; allResults.push({ idx: i, name: names[i], self: true }); continue; }
        }
      }
      try {
        const doSearch = async (q) => {
          const r = await fetch('https://api.dupr.gg/player/v1.0/search', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
            body: JSON.stringify({ query: q, limit: 10, offset: 0, filter: { lat: 51.05, lng: -114.07, radiusInMeters: 1000000 }, includeUnclaimedPlayers: false })
          });
          return r.json();
        };
        let searchData = await doSearch(names[i]);
        if (searchData.status === 'SUCCESS' && searchData.result && (!searchData.result.hits || !searchData.result.hits.length)) {
          const parts = names[i].trim().split(/\s+/);
          if (parts.length > 1) searchData = await doSearch(parts[parts.length - 1]);
        }
        const hits = (searchData.status === 'SUCCESS' && searchData.result && searchData.result.hits) || [];
        const autoMatch = hits.length ? fuzzyMatchPlayer(names[i], hits) : null;
        const autoRating = autoMatch?.ratings ? (parseFloat(autoMatch.ratings.doubles) || parseFloat(autoMatch.ratings.singles) || 0) : 0;
        if (autoRating > 0) { duprs[i] = autoRating; found++; }
        allResults.push({ idx: i, name: names[i], hits, autoMatch, autoRating });
      } catch (e) { allResults.push({ idx: i, name: names[i], hits: [], autoMatch: null, autoRating: 0, error: e.message }); }
    }

    // Auto-apply confident matches to player list immediately
    renderPlayerList(names, duprs);

    // Show interactive picker for review/correction
    status.style.color = '#4ecca3';
    status.innerHTML = `✅ Auto-filled ${found}/${names.length} players. Review & correct below:`;
    const pickerDiv = document.createElement('div');
    pickerDiv.id = 'duprPicker';
    pickerDiv.style.cssText = 'margin-top:8px;max-height:400px;overflow-y:auto';

    const buildSelect = (idx, hits, autoMatch) => {
      let html = `<select data-idx="${idx}" style="background:#16213e;color:#eee;border:1px solid #333;border-radius:4px;padding:4px;font-size:12px;min-width:200px">`;
      html += `<option value="">Skip (${hits.length} results)</option>`;
      hits.forEach(h => {
        const name = h.fullName || h.name || 'Unknown';
        const rating = h.ratings ? (parseFloat(h.ratings.doubles) || parseFloat(h.ratings.singles) || 0) : 0;
        const ratingStr = rating > 0 ? ` (${rating})` : ' (NR)';
        const selected = autoMatch && name === autoMatch.fullName ? ' selected' : '';
        html += `<option value="${rating}"${selected}>${name}${ratingStr}</option>`;
      });
      html += `</select>`;
      return html;
    };

    allResults.forEach(r => {
      const row = document.createElement('div');
      row.style.cssText = 'padding:6px 0;border-bottom:1px solid #1a1a2e;display:flex;align-items:center;gap:6px;flex-wrap:wrap';
      if (r.self) {
        row.innerHTML = `<span style="color:#4ecca3">✅ ${r.name} → self (${duprs[r.idx]})</span>`;
      } else {
        let html = `<span style="color:#aaa;min-width:90px">${r.name} (${r.hits.length} hits${r.error ? ', ERR: '+r.error : ''}) →</span>`;
        html += buildSelect(r.idx, r.hits, r.autoMatch);
        html += `<input data-ridx="${r.idx}" placeholder="Re-search name" style="width:120px;padding:4px;border-radius:4px;border:1px solid #333;background:#16213e;color:#eee;font-size:12px">`;
        html += `<button data-ridx="${r.idx}" style="padding:4px 8px;font-size:11px;margin:0;background:#0f3460">🔍</button>`;
        row.innerHTML = html;
        row.querySelector(`button[data-ridx="${r.idx}"]`).onclick = async function() {
          const input = row.querySelector(`input[data-ridx="${r.idx}"]`);
          const q = input.value.trim();
          if (!q) return;
          try {
            const sr = await fetch('https://api.dupr.gg/player/v1.0/search', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
              body: JSON.stringify({ query: q, limit: 10, offset: 0, filter: { lat: 51.05, lng: -114.07, radiusInMeters: 1000000 }, includeUnclaimedPlayers: false })
            });
            const sd = await sr.json();
            const newHits = (sd.status === 'SUCCESS' && sd.result && sd.result.hits) || [];
            const sel = row.querySelector(`select[data-idx="${r.idx}"]`);
            sel.outerHTML = buildSelect(r.idx, newHits, null);
          } catch (e) {}
        };
      }
      pickerDiv.appendChild(row);
    });
    const applyBtn = document.createElement('button');
    applyBtn.textContent = '✅ Apply Selections';
    applyBtn.style.cssText = 'margin-top:10px;padding:8px 16px';
    applyBtn.onclick = () => {
      pickerDiv.querySelectorAll('select').forEach(sel => {
        const idx = parseInt(sel.dataset.idx);
        const val = parseFloat(sel.value) || 0;
        if (val > 0) duprs[idx] = val;
      });
      let applied = duprs.filter(d => d > 0).length;
      const combined = names.map((n, i) => ({ n, d: duprs[i] }));
      combined.sort((a, b) => b.d - a.d);
      renderPlayerList(combined.map(p => p.n), combined.map(p => p.d));
      pickerDiv.querySelectorAll('[data-idx]').forEach(sel => {
        const idx = parseInt(sel.dataset.idx);
        if (duprs[idx] > 0) sel.closest('div').style.display = 'none';
      });
      const remaining = names.filter((_, i) => !duprs[i] || duprs[i] <= 0).length;
      if (remaining === 0) { pickerDiv.remove(); }
      status.style.color = '#4ecca3';
      status.textContent = remaining > 0
        ? `✅ Applied ${applied}/${names.length} ratings. ${remaining} still unmatched below:`
        : `✅ Applied DUPR ratings for ${applied}/${names.length} players (sorted by rating).`;
    };
    pickerDiv.appendChild(applyBtn);
    status.parentNode.insertBefore(pickerDiv, status.nextSibling);
    // Clear credentials from inputs
    document.getElementById('duprPass').value = '';
  } catch (e) {
    status.style.color = '#ff6b6b';
    status.textContent = '❌ Error: ' + e.message;
  }
}

const SCHEDULE_URL = 'https://docs.google.com/document/d/12111pYeuP-AgHln3_F2Fkha8jMoTxqInJQK-HX_r9ss/export?format=txt';
let scheduleData = {};

function fetchSchedule() {
  document.getElementById('dateSelect').innerHTML = '<option value="">Loading...</option>';
  fetch(SCHEDULE_URL)
    .then(r => r.text())
    .then(text => {
      scheduleData = {};
      // Find all date headers and their positions
      const datePattern = /(?:WED|FRI|MON|TUE|THU|SAT|SUN)\s+[A-Z]+\s+\d+/gi;
      const headers = [];
      let m;
      while ((m = datePattern.exec(text)) !== null) headers.push({ key: m[0].trim(), idx: m.index + m[0].length });

      // Extract numbered entries from a text chunk
      function extractPlayers(body) {
        const players = [];
        const re = /(\d+)\.\s*([^0-9?][^0-9]*?)(?=\s*\d+\.|$)/g;
        let pm;
        while ((pm = re.exec(body)) !== null) {
          const name = pm[2].trim().replace(/\.+$/, '');
          if (name && name !== '?') players.push(name);
        }
        // Last entry may have trailing waitlist names — cap to 2 words
        if (players.length) {
          const last = players[players.length - 1].split(/\s+/);
          if (last.length > 2) players[players.length - 1] = last.slice(0, 2).join(' ');
        }
        return players;
      }

      headers.forEach((h, i) => {
        const nextStart = i + 1 < headers.length ? headers[i + 1].idx - headers[i + 1].key.length : undefined;
        const body = text.substring(h.idx, nextStart);
        // Check if numbering restarts at "1." — means two dates share this body
        // Split at the second occurrence of "1." (preceded by a higher number)
        const restartMatch = body.match(/(\d+\.\s*[^0-9?].*?)\s+(?=1\.\s*[^0-9?])/);
        if (restartMatch) {
          const splitIdx = body.indexOf(restartMatch[0]) + restartMatch[0].length;
          const firstHalf = body.substring(0, splitIdx);
          const secondHalf = body.substring(splitIdx);
          // First half belongs to the previous date header (which had empty body)
          if (i > 0 && !scheduleData[headers[i - 1].key]) {
            const p = extractPlayers(firstHalf);
            if (p.length) scheduleData[headers[i - 1].key] = p;
          }
          const p = extractPlayers(secondHalf);
          if (p.length) scheduleData[h.key] = p;
        } else {
          const p = extractPlayers(body);
          if (p.length) scheduleData[h.key] = p;
        }
      });

      const sel = document.getElementById('dateSelect');
      sel.innerHTML = '<option value="">-- Select a date --</option>';
      Object.keys(scheduleData).forEach(d => {
        const opt = document.createElement('option');
        opt.value = d;
        opt.textContent = d + ' (' + scheduleData[d].length + ' players)';
        sel.appendChild(opt);
      });
    })
    .catch(() => {
      document.getElementById('dateSelect').innerHTML = '<option value="">Failed to load schedule</option>';
    });
}

function onDateSelect() {
  const key = document.getElementById('dateSelect').value;
  if (!key || !scheduleData[key]) return;
  const players = scheduleData[key];
  renderPlayerList(players);
  const courts = Math.floor(players.length / 4);
  document.getElementById('numCourts').value = courts;
}

// --- Round Robin Mode ---
let rrState = null;
let rrDb;

function initRRDb() {
  if (!rrDb) rrDb = firebase.database().ref(getRrPath());
}

function startRoundRobin() {
  const names = getPlayerNames().filter(Boolean);
  if (names.length < 4) return alert('Need at least 4 players for round robin.');
  const duprs = getPlayerDuprs();
  const numCourts = parseInt(document.getElementById('numCourts').value);
  const hasDupr = duprs.some(d => d > 0);

  let teams;
  if (hasDupr) {
    // Balanced pairing: sort by DUPR, pair strongest with weakest
    const sorted = names.map((_, i) => i).sort((a, b) => (duprs[b] || 0) - (duprs[a] || 0));
    teams = [];
    const half = Math.floor(sorted.length / 2);
    for (let i = 0; i < half; i++)
      teams.push([sorted[i], sorted[sorted.length - 1 - i]]);
    // If odd number, pair remaining with strongest unmatched
    if (sorted.length % 2) teams.push([sorted[half], sorted[0]]);
  } else {
    // All possible team pairings
    teams = [];
    for (let i = 0; i < names.length; i++)
      for (let j = i + 1; j < names.length; j++)
        teams.push([i, j]);
  }

  // Generate matchups: every team vs every other team (no player plays against themselves)
  const matchups = [];
  for (let a = 0; a < teams.length; a++)
    for (let b = a + 1; b < teams.length; b++) {
      const ta = teams[a], tb = teams[b];
      if (ta[0] !== tb[0] && ta[0] !== tb[1] && ta[1] !== tb[0] && ta[1] !== tb[1])
        matchups.push({ teamA: ta, teamB: tb });
    }

  // Schedule rounds: each round fills up to numCourts games, no player plays twice per round
  const rounds = [];
  const used = new Set();
  let pool = matchups.map((m, i) => i);
  while (pool.length) {
    const round = [];
    const busyPlayers = new Set();
    const remaining = [];
    for (const idx of pool) {
      const m = matchups[idx];
      const ps = [...m.teamA, ...m.teamB];
      if (round.length < numCourts && ps.every(p => !busyPlayers.has(p))) {
        round.push(idx);
        ps.forEach(p => busyPlayers.add(p));
      } else {
        remaining.push(idx);
      }
    }
    if (!round.length) break; // can't schedule more
    rounds.push(round);
    pool = remaining;
  }

  rrState = {
    players: names,
    duprs: duprs,
    matchups,
    rounds,
    currentRound: 0,
    results: {},
    log: []
  };

  initRRDb();
  document.getElementById('setup').style.display = 'none';
  document.getElementById('rrGame').style.display = 'block';
  saveRR();
  renderRR();
}

function saveRR() {
  initRRDb();
  rrDb.set(rrState);
}

function renderRR() {
  if (!rrState) return;
  const { players, matchups, rounds, currentRound, results } = rrState;

  if (currentRound >= rounds.length) {
    document.getElementById('rrRoundNum').textContent = 'Complete!';
    document.getElementById('rrTotalRounds').textContent = rounds.length;
    document.getElementById('rrCourts').innerHTML = '<div style="text-align:center;color:#4ecca3;font-size:18px;padding:20px">🏆 All rounds complete!</div>';
    renderRRStandings();
    renderRRLog();
    return;
  }

  document.getElementById('rrRoundNum').textContent = currentRound + 1;
  document.getElementById('rrTotalRounds').textContent = rounds.length;

  const roundMatchups = rounds[currentRound];
  let html = '';
  let allDone = true;

  roundMatchups.forEach((mi, ci) => {
    const m = matchups[mi];
    const tA = m.teamA.map(i => players[i]).join(' & ');
    const tB = m.teamB.map(i => players[i]).join(' & ');
    const res = results[mi];
    html += `<div class="court"><h2>Court ${ci + 1}</h2>`;
    html += `<div class="match">`;
    html += `<div class="team"><span class="name">${tA}</span></div>`;
    html += `<div class="vs">VS</div>`;
    html += `<div class="team"><span class="name">${tB}</span></div>`;
    if (res) {
      html += `<div style="text-align:center;color:#4ecca3;margin-top:8px;font-weight:600">🏆 ${res === 'A' ? tA : tB}</div>`;
      html += `<button onclick="clearRRResult(${mi})" style="background:#0f3460;margin-top:4px;font-size:12px">↩ Change</button>`;
    } else {
      allDone = false;
      html += `<button onclick="recordRRResult(${mi},'A')">🏆 ${tA} Win</button>`;
      html += `<button onclick="recordRRResult(${mi},'B')" style="background:#0f3460;margin-top:4px">🏆 ${tB} Win</button>`;
    }
    html += `</div></div>`;
  });

  if (allDone && roundMatchups.every(mi => results[mi])) {
    html += `<div style="text-align:center;margin-top:10px"><button onclick="advanceRRRound()">Next Round →</button></div>`;
  }

  document.getElementById('rrCourts').innerHTML = html;
  renderRRStandings();
  renderRRLog();
}

function recordRRResult(mi, winner) {
  rrState.results[mi] = winner;
  saveRR();
  renderRR();
}

function clearRRResult(mi) {
  delete rrState.results[mi];
  saveRR();
  renderRR();
}

function advanceRRRound() {
  const { players, matchups, rounds, currentRound, results } = rrState;
  let logEntry = `<strong>Round ${currentRound + 1}:</strong><br>`;
  rounds[currentRound].forEach(mi => {
    const m = matchups[mi];
    const tA = m.teamA.map(i => players[i]).join(' & ');
    const tB = m.teamB.map(i => players[i]).join(' & ');
    const winner = results[mi] === 'A' ? tA : tB;
    logEntry += `🏆 ${winner} beat ${results[mi] === 'A' ? tB : tA}<br>`;
  });
  rrState.log.push(logEntry);
  rrState.currentRound++;
  saveRR();
  renderRR();
}

function renderRRStandings() {
  const { players, duprs, matchups, results } = rrState;
  const stats = players.map((name, i) => ({ name, idx: i, dupr: (duprs && duprs[i]) || 0, wins: 0, losses: 0, played: 0 }));
  Object.entries(results).forEach(([mi, winner]) => {
    const m = matchups[parseInt(mi)];
    const winTeam = winner === 'A' ? m.teamA : m.teamB;
    const loseTeam = winner === 'A' ? m.teamB : m.teamA;
    winTeam.forEach(i => { stats[i].wins++; stats[i].played++; });
    loseTeam.forEach(i => { stats[i].losses++; stats[i].played++; });
  });
  stats.sort((a, b) => b.wins - a.wins || a.losses - b.losses);
  let html = '<h2 style="color:#e94560;margin-bottom:10px">📊 Standings</h2>';
  html += '<div style="background:#16213e;border-radius:8px;padding:12px">';
  stats.forEach((s, i) => {
    const pct = s.played ? Math.round(100 * s.wins / s.played) : 0;
    const duprTag = s.dupr ? ` <span class="dupr-badge">${s.dupr.toFixed(1)}</span>` : '';
    html += `<div style="display:flex;justify-content:space-between;padding:6px 8px;${i === 0 && s.wins > 0 ? 'color:#4ecca3;font-weight:700' : ''}">`;
    html += `<span>${i + 1}. ${s.name}${duprTag}</span>`;
    html += `<span>${s.wins}W - ${s.losses}L (${pct}%)</span></div>`;
  });
  html += '</div>';
  document.getElementById('rrStandings').innerHTML = html;
}

function renderRRLog() {
  if (!rrState.log.length) { document.getElementById('rrLog').innerHTML = ''; return; }
  let html = '<h2 style="color:#e94560;margin-bottom:10px">History</h2>';
  rrState.log.slice().reverse().forEach(h => {
    html += `<div class="history-entry">${h}</div>`;
  });
  document.getElementById('rrLog').innerHTML = html;
}

function resetRR() {
  if (!confirm('Reset round robin for everyone?')) return;
  rrState = null;
  initRRDb();
  rrDb.remove();
  document.getElementById('rrGame').style.display = 'none';
  document.getElementById('setup').style.display = 'block';
  document.getElementById('rrStandings').innerHTML = '';
  document.getElementById('rrLog').innerHTML = '';
}

// Listen for RR state from Firebase
function listenRR() {
  initRRDb();
  rrDb.on('value', snap => {
    const data = snap.val();
    if (data && data.players) {
      rrState = data;
      rrState.results = rrState.results || {};
      rrState.log = rrState.log || [];
      document.getElementById('setup').style.display = 'none';
      document.getElementById('game').style.display = 'none';
      document.getElementById('rrGame').style.display = 'block';
      renderRR();
    }
  });
}
